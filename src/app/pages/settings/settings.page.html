<div class="page">
  <!-- Header -->
  <div class="header">
    <div>
      <h1 class="title">Ajustes</h1>
      <p class="subtitle">Configuración y conexiones de la empresa.</p>
    </div>
  </div>

  <!-- Sección: Integraciones -->
  <p class="section-label">Integraciones</p>

  <!-- Card: Google Contacts -->
  <div class="card bg-base-100 shadow-sm">
    <div class="card-body">
      <div class="flex items-start justify-between gap-4 flex-wrap">
        <!-- Ícono + info -->
        <div class="flex items-center gap-3">
          <div class="google-icon-wrap">
            <!-- Google "G" logo -->
            <svg
              viewBox="0 0 24 24"
              width="28"
              height="28"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"
              />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"
              />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                fill="#FBBC05"
              />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335"
              />
            </svg>
          </div>

          <div>
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-semibold">Google Contacts</span>
              <span
                *ngIf="status?.connected"
                class="badge badge-success badge-sm"
                >Conectado</span
              >
              <span
                *ngIf="!loadingStatus && status && !status.connected"
                class="badge badge-ghost badge-sm"
                >No conectado</span
              >
            </div>

            <p
              *ngIf="status?.connected"
              class="text-sm text-base-content/60 mt-0.5"
            >
              {{ status?.email }}
            </p>
            <p
              *ngIf="!loadingStatus && status && !status.connected"
              class="text-sm text-base-content/60 mt-0.5"
            >
              Sincroniza tus clientes con Google Contacts.
            </p>
          </div>
        </div>

        <!-- Acciones -->
        <div class="flex items-center gap-2 shrink-0">
          <span
            *ngIf="loadingStatus"
            class="loading loading-spinner loading-sm"
          ></span>

          <!-- No conectado -->
          <button
            *ngIf="!loadingStatus && status && !status.connected"
            class="btn btn-neutral btn-sm"
            type="button"
            (click)="connectGoogle()"
          >
            Conectar Google Contacts
          </button>

          <!-- Conectado -->
          <ng-container *ngIf="!loadingStatus && status?.connected">
            <button
              class="btn btn-sm"
              type="button"
              (click)="syncNow()"
              [disabled]="loadingSync || loadingDisconnect"
            >
              <span
                *ngIf="loadingSync"
                class="loading loading-spinner loading-xs"
              ></span>
              Sincronizar ahora
            </button>

            <button
              class="btn btn-sm btn-ghost text-error"
              type="button"
              (click)="openDisconnect()"
              [disabled]="loadingSync || loadingDisconnect"
            >
              Desconectar
            </button>
          </ng-container>
        </div>
      </div>

      <!-- Error de carga -->
      <div *ngIf="statusError" class="alert alert-error mt-3">
        <span>{{ statusError }}</span>
      </div>
    </div>
  </div>

  <!-- Card: Importar Cuentas -->
  <a
    routerLink="/import/accounts"
    class="card bg-base-100 shadow-sm hover:shadow-md transition-shadow cursor-pointer"
  >
    <div class="card-body">
      <div class="flex items-center gap-3">
        <div class="bg-base-200 rounded-lg p-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
        </div>
        <div>
          <span class="font-semibold">Importar Cuentas</span>
          <p class="text-sm text-base-content/60 mt-0.5">
            Importa cuentas, perfiles y clientes desde un archivo CSV.
          </p>
        </div>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="ml-auto text-base-content/40"
        >
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </div>
    </div>
  </a>

  <!-- Toast -->
  <div *ngIf="toast" class="toast toast-end toast-bottom z-[99999]">
    <div
      class="alert"
      [class.alert-success]="toast.type === 'success'"
      [class.alert-error]="toast.type === 'error'"
    >
      <span>{{ toast.message }}</span>
    </div>
  </div>

  <!-- Modal: Confirmar desconexión -->
  <app-confirm-action-modal
    [open]="disconnectOpen"
    title="¿Desconectar Google Contacts?"
    message="Se eliminará la conexión con tu cuenta de Google. Los contactos ya importados no se eliminarán."
    confirmLabel="Desconectar"
    [danger]="true"
    [loading]="loadingDisconnect"
    (confirm)="confirmDisconnect()"
    (cancel)="closeDisconnect()"
  />
</div>
