<div class="page">
  <div *ngIf="errorMessage" class="alert alert-error">
    <span>{{ errorMessage }}</span>
  </div>

  <app-platforms-tabs
    [platforms]="platforms"
    [activePlatformId]="activePlatformId"
    [canCreate]="canPlatformsCreate"
    [canUpdate]="canPlatformsUpdate"
    [canDelete]="canPlatformsDelete"
    (filterChange)="onFilterChange($event)"
    (createPlatform)="openCreatePlatform()"
    (editPlatform)="onEditPlatform($event)"
    (deletePlatform)="onDeletePlatform($event)"
    (manageLabels)="onManageLabels($event)"
  />

  <div class="header">
    <div>
      <h1 class="title">Cuentas</h1>
      <p class="text-sm opacity-70">
        Mostrando: <b>{{ activePlatformId ? '1 plataforma' : 'todas' }}</b> ·
        Cuentas: <b>{{ filteredAccounts.length }}</b>
      </p>
    </div>
    <button
      class="btn btn-neutral"
      (click)="openCreateAccount()"
      [disabled]="!canAccountsCreate"
    >
      + Cuenta
    </button>
  </div>

  <app-accounts-table
    [accounts]="filteredAccounts"
    [loading]="loading"
    [canUpdate]="canAccountsUpdate"
    [canDelete]="canAccountsDelete"
    [showLoadMore]="totalLoaded >= currentLimit"
    [labels]="labels"
    (viewAccount)="onViewAccount($event)"
    (editAccount)="onEditAccount($event)"
    (renewAccount)="onRenewAccount($event)"
    (replaceAccount)="onReplaceAccount($event)"
    (changePassword)="onChangePassword($event)"
    (deleteAccount)="onDeleteAccount($event)"
    (changeStatus)="onChangeStatus($event)"
    (loadMore)="loadMore()"
  />

  <!-- Modales plataformas -->
  <app-create-platform-modal
    [open]="createPlatformOpen"
    (close)="closeAll()"
    (created)="onPlatformChanged()"
  />
  <app-edit-platform-modal
    [open]="editPlatformOpen"
    [platform]="selectedPlatform"
    (close)="closeAll()"
    (updated)="onPlatformChanged()"
  />
  <app-delete-platform-modal
    [open]="deletePlatformOpen"
    [platform]="selectedPlatform"
    (close)="closeAll()"
    (deleted)="onPlatformChanged()"
  />

  <!-- Modales cuentas -->
  <app-create-account-modal
    [open]="createAccountOpen"
    [platforms]="platforms"
    (close)="closeAll()"
    (created)="onAccountChanged()"
  />
  <app-edit-account-modal
    [open]="editAccountOpen"
    [account]="selectedAccount"
    [platforms]="platforms"
    (close)="closeAll()"
    (updated)="onAccountChanged()"
  />
  <app-account-drawer
    [open]="viewAccountOpen"
    [account]="selectedAccount"
    [canSell]="canSalesCreate"
    (close)="closeAll()"
    (changed)="onAccountChanged()"
    (saleCreated)="load()"
    (changed)="onAccountChanged()"
  />
  <app-renew-account-modal
    [open]="renewAccountOpen"
    [account]="selectedAccount"
    (close)="renewAccountOpen = false; selectedAccount = null"
    (renewed)="onAccountRenewed()"
  />
  <app-replace-account-modal
    [open]="replaceAccountOpen"
    [account]="selectedAccount"
    [accounts]="accounts"
    (close)="replaceAccountOpen = false; selectedAccount = null"
    (replaced)="onAccountReplaced()"
  />
  <app-change-password-modal
    [open]="changePasswordOpen"
    [account]="selectedAccount"
    (close)="changePasswordOpen = false; selectedAccount = null"
    (updated)="onPasswordChanged()"
  />
  <!-- Confirm eliminar cuenta -->
  <app-confirm-action-modal
    [open]="deleteAccountOpen"
    title="¿Eliminar cuenta?"
    [message]="'Estás a punto de eliminar <strong>' + accountToDelete?.email + '</strong>. Las ventas vencidas se cancelarán automáticamente. Esta acción no se puede deshacer.'"
    confirmLabel="Sí, eliminar"
    [danger]="true"
    [loading]="loadingDelete"
    (confirm)="confirmDeleteAccount()"
    (cancel)="deleteAccountOpen = false; accountToDelete = null"
  />
  <app-change-status-modal
    [open]="changeStatusOpen"
    [account]="selectedAccount"
    (close)="changeStatusOpen = false; selectedAccount = null"
    (updated)="onStatusChanged()"
  />
  <app-manage-labels-modal
    [open]="manageLabelsOpen"
    [platform]="selectedPlatform"
    (close)="manageLabelsOpen = false; selectedPlatform = null"
  />
</div>
