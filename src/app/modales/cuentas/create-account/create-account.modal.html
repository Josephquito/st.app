<dialog class="modal" [class.modal-open]="open">
  <div class="modal-box max-w-3xl">
    <h3 class="font-bold text-lg">Crear cuenta</h3>

    <div *ngIf="errorMessage" class="alert alert-error mt-3">
      <span>{{ errorMessage }}</span>
    </div>

    <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-3">
      <!-- Plataforma -->
      <label class="form-control">
        <div class="label"><span class="label-text">Plataforma</span></div>
        <select class="select select-bordered" [(ngModel)]="platformId">
          <option [ngValue]="null" disabled>Selecciona...</option>
          <option *ngFor="let p of platforms" [ngValue]="p.id">
            {{ p.name }}
          </option>
        </select>
      </label>

      <!-- Proveedor typeahead -->
      <div class="form-control relative">
        <div class="label"><span class="label-text">Proveedor</span></div>

        <input
          class="input input-bordered w-full"
          [(ngModel)]="supplierQuery"
          (input)="onSupplierQueryChange()"
          (focus)="supplierDropdownOpen = true"
          (blur)="onSupplierBlur()"
          (keydown.enter)="onSupplierEnter($event)"
          placeholder="Busca un proveedor..."
        />

        <!-- Dropdown -->
        <div
          *ngIf="supplierDropdownOpen && supplierQuery.trim().length > 0"
          class="absolute left-0 right-0 top-[72px] z-50 rounded-box border bg-base-100 shadow overflow-hidden"
        >
          <!-- Resultados con scroll vertical, máximo 3 visibles -->
          <ul class="menu p-2 pb-0 max-h-[9rem] overflow-y-auto overflow-x-hidden flex-nowrap">
            <li *ngFor="let s of supplierMatches; trackBy: trackSupplier">
              <button
                type="button"
                class="justify-between"
                (mousedown)="selectSupplier(s)"
              >
                <span class="truncate min-w-0">
                  {{ s.name }}
                  <span class="opacity-60" *ngIf="s.contact"
                    >· {{ s.contact }}</span
                  >
                </span>
                <span class="badge badge-ghost shrink-0">Elegir</span>
              </button>
            </li>

            <li *ngIf="supplierMatches.length === 0">
              <span class="opacity-50 text-sm"
                >Sin resultados para "{{ supplierQuery.trim() }}"</span
              >
            </li>
          </ul>

          <!-- Botón crear siempre visible, fuera del scroll -->
          <div class="divider my-0 px-2"></div>
          <ul class="menu px-2 pb-2 pt-0">
            <li>
              <button
                type="button"
                class="justify-between"
                (mousedown)="openCreateSupplier()"
              >
                <span>+ Registrar nuevo proveedor</span>
                <span class="badge badge-neutral shrink-0">Nuevo</span>
              </button>
            </li>
          </ul>
        </div>
      </div>

      <!-- Email -->
      <label class="form-control">
        <div class="label"><span class="label-text">Email</span></div>
        <input class="input input-bordered" type="email" [(ngModel)]="email" />
      </label>

      <!-- Password -->
      <label class="form-control">
        <div class="label"><span class="label-text">Clave</span></div>
        <input class="input input-bordered" [(ngModel)]="password" />
      </label>

      <!-- Perfiles -->
      <label class="form-control">
        <div class="label"><span class="label-text">Perfiles total</span></div>
        <input
          class="input input-bordered"
          type="number"
          min="1"
          [(ngModel)]="profilesTotal"
        />
      </label>

      <!-- Costo total -->
      <label class="form-control">
        <div class="label"><span class="label-text">Costo total</span></div>
        <input
          class="input input-bordered"
          [ngModel]="totalCost"
          (ngModelChange)="onTotalCostChange($event)"
          placeholder="12,50 o 12.50"
          inputmode="decimal"
        />
      </label>

      <!-- Fecha compra -->
      <label class="form-control">
        <div class="label"><span class="label-text">Fecha compra</span></div>
        <input
          class="input input-bordered"
          type="date"
          [(ngModel)]="purchaseDate"
          (ngModelChange)="recalcCutoffDate()"
        />
      </label>

      <!-- Período / Fecha corte -->
      <div class="form-control">
        <div class="label"><span class="label-text">Duración</span></div>

        <div class="flex gap-2 flex-wrap">
          <select
            class="select select-bordered"
            [ngModel]="periodMonths"
            (ngModelChange)="onPeriodMonthsChange($event)"
          >
            <option [ngValue]="null">Meses (opcional)</option>
            <option [ngValue]="1">1 mes</option>
            <option [ngValue]="3">3 meses</option>
            <option [ngValue]="6">6 meses</option>
            <option [ngValue]="12">12 meses</option>
          </select>

          <input
            class="input input-bordered flex-1 min-w-[120px]"
            type="number"
            [ngModel]="periodDays"
            (ngModelChange)="onPeriodDaysChange($event)"
            placeholder="Días (ej: 30)"
            min="1"
          />
        </div>

        <div class="label">
          <span class="label-text-alt opacity-70">
            Días calculados: <b>{{ durationDays }}</b> · Fecha de corte:
            <b>{{ cutoffDate || '—' }}</b>
          </span>
        </div>
      </div>
    </div>

    <!-- Modal crear proveedor -->
    <app-create-supplier-modal
      [open]="createSupplierOpen"
      (close)="createSupplierOpen = false"
      (created)="onSupplierCreated($event)"
    />

    <div class="modal-action">
      <button
        class="btn"
        type="button"
        (click)="onClose()"
        [disabled]="loading"
      >
        Cancelar
      </button>
      <button
        class="btn btn-neutral"
        type="button"
        (click)="submit()"
        [disabled]="loading"
      >
        <span *ngIf="loading" class="loading loading-spinner loading-sm"></span>
        Crear
      </button>
    </div>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button type="button" (click)="onClose()">close</button>
  </form>
</dialog>
