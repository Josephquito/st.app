<dialog class="modal" [class.modal-open]="open">
  <div class="modal-box max-w-sm">
    <h3 class="font-bold text-lg">Cambiar clave</h3>
    <p class="text-sm opacity-70 mt-1">
      {{ account?.platform?.name || '—' }} · {{ account?.email || '—' }}
    </p>

    <div *ngIf="errorMessage" class="alert alert-error mt-3">
      <span>{{ errorMessage }}</span>
    </div>

    <div class="mt-4">
      <label class="form-control">
        <input
          class="input input-bordered w-full"
          [(ngModel)]="password"
          placeholder="Nueva clave"
          [type]="showPassword ? 'text' : 'password'"
        />
      </label>
      <label class="label cursor-pointer justify-start gap-2 mt-1">
        <input
          type="checkbox"
          class="checkbox checkbox-sm"
          [(ngModel)]="showPassword"
        />
        <span class="label-text opacity-60">Mostrar clave</span>
      </label>
    </div>

    <div class="modal-action">
      <button
        class="btn btn-ghost"
        type="button"
        (click)="onClose()"
        [disabled]="loading"
      >
        Cancelar
      </button>
      <button
        class="btn btn-neutral"
        type="button"
        (click)="submit()"
        [disabled]="loading || !password.trim()"
      >
        <span *ngIf="loading" class="loading loading-spinner loading-sm"></span>
        Guardar
      </button>
    </div>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button type="button" (click)="onClose()">close</button>
  </form>
</dialog>
