<dialog class="modal" [class.modal-open]="open">
  <div class="modal-box">
    <h3 class="font-bold text-lg">
      Crear un {{ baseRole === 'ADMIN' ? 'Admin' : 'Empleado' }}
    </h3>

    <div *ngIf="error" class="alert alert-error mt-3">
      <span>{{ error }}</span>
    </div>

    <div class="mt-4 space-y-3">
      <input
        class="input input-bordered w-full"
        placeholder="Email"
        type="email"
        [(ngModel)]="email"
        [disabled]="loading"
      />
      <input
        class="input input-bordered w-full"
        placeholder="Contraseña"
        type="password"
        [(ngModel)]="password"
        [disabled]="loading"
      />
      <input
        class="input input-bordered w-full"
        placeholder="Nombre completo"
        [(ngModel)]="nombre"
        [disabled]="loading"
      />
      <input
        class="input input-bordered w-full"
        placeholder="Teléfono"
        type="tel"
        [(ngModel)]="phone"
        [disabled]="loading"
      />
    </div>

    <div class="modal-action">
      <button class="btn" (click)="onClose()" [disabled]="loading">
        Cancelar
      </button>
      <button class="btn btn-neutral" (click)="submit()" [disabled]="loading">
        <span *ngIf="!loading">Crear</span>
        <span *ngIf="loading" class="loading loading-spinner loading-sm"></span>
      </button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop" (click)="onClose()">
    <button>close</button>
  </form>
</dialog>
