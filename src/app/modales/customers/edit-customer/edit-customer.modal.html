<dialog class="modal" [class.modal-open]="open">
  <div class="modal-box">
    <h3 class="font-bold text-lg">Editar cliente</h3>

    <div *ngIf="errorMessage" class="alert alert-error mt-3">
      <span>{{ errorMessage }}</span>
    </div>

    <div class="mt-4 grid gap-3">
      <label class="form-control w-full">
        <div class="label"><span class="label-text">Nombre</span></div>
        <input class="input input-bordered w-full" [(ngModel)]="name" />
      </label>

      <label class="form-control w-full">
        <div class="label"><span class="label-text">Contacto</span></div>
        <input class="input input-bordered w-full" [(ngModel)]="contact" />
      </label>

      <label class="form-control w-full">
        <div class="label">
          <span class="label-text">Origen (opcional)</span>
        </div>
        <select class="select select-bordered w-full" [(ngModel)]="source">
          <option value="">— Sin origen —</option>
          <option *ngFor="let opt of sourceOptions" [value]="opt.value">
            {{ opt.label }}
          </option>
        </select>
      </label>

      <label *ngIf="needsSourceNote" class="form-control w-full">
        <div class="label"><span class="label-text">¿Cuál origen?</span></div>
        <input
          class="input input-bordered w-full"
          [(ngModel)]="sourceNote"
          placeholder="Ej: TikTok, feria, etc."
        />
      </label>

      <label class="form-control w-full">
        <div class="label">
          <span class="label-text">Notas internas (opcional)</span>
        </div>
        <textarea
          class="textarea textarea-bordered w-full"
          [(ngModel)]="notes"
          rows="2"
        ></textarea>
      </label>

      <label class="form-control w-full">
        <div class="label">
          <span class="label-text">Saldo (opcional)</span>
        </div>
        <input class="input input-bordered w-full" [(ngModel)]="balance" />
      </label>
    </div>

    <div class="modal-action">
      <button
        class="btn"
        type="button"
        (click)="onClose()"
        [disabled]="loading"
      >
        Cancelar
      </button>
      <button
        class="btn btn-neutral"
        type="button"
        (click)="submit()"
        [disabled]="loading"
      >
        <span *ngIf="loading" class="loading loading-spinner loading-sm"></span>
        Guardar
      </button>
    </div>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button type="button" (click)="onClose()">close</button>
  </form>
</dialog>
