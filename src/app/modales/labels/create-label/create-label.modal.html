<dialog class="modal" [class.modal-open]="open">
  <div class="modal-box">
    <h3 class="font-bold text-lg">
      {{ isEdit ? 'Editar etiqueta' : 'Nueva etiqueta' }} para {{ platform?.name
      || '—' }}
    </h3>

    <div *ngIf="errorMessage" class="alert alert-error mt-3">
      <span>{{ errorMessage }}</span>
    </div>

    <div class="mt-4 grid gap-3">
      <!-- Nombre -->
      <label class="form-control w-full">
        <div class="label"><span class="label-text">Nombre</span></div>
        <input
          class="input input-bordered w-full"
          [(ngModel)]="name"
          placeholder="ESPN, Solo Películas, etc."
        />
      </label>

      <!-- Color -->
      <div class="form-control">
        <div class="label"><span class="label-text">Color</span></div>
        <div class="flex flex-wrap gap-2">
          <button
            *ngFor="let c of colors"
            type="button"
            class="w-8 h-8 rounded-full border-2 transition-all"
            [style.background-color]="c.hex"
            [class.border-base-content]="selectedColor === c.hex"
            [class.border-transparent]="selectedColor !== c.hex"
            [title]="c.name"
            (click)="selectedColor = c.hex"
          ></button>
        </div>
      </div>
    </div>

    <div class="modal-action">
      <button
        class="btn"
        type="button"
        (click)="onClose()"
        [disabled]="loading"
      >
        Cancelar
      </button>
      <button
        class="btn btn-neutral"
        type="button"
        (click)="submit()"
        [disabled]="loading"
      >
        <span *ngIf="loading" class="loading loading-spinner loading-sm"></span>
        {{ isEdit ? 'Guardar' : 'Crear' }}
      </button>
    </div>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button type="button" (click)="onClose()">close</button>
  </form>
</dialog>
