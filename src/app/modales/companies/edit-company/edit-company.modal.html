<dialog class="modal" [class.modal-open]="open">
  <div class="modal-box">
    <h3 class="font-bold text-lg">Editar empresa</h3>

    <div *ngIf="errorMessage" class="alert alert-error mt-3 text-sm py-2.5">
      <span>{{ errorMessage }}</span>
    </div>

    <div class="mt-4 grid gap-3">
      <label class="form-control w-full">
        <div class="label"><span class="label-text">Nombre</span></div>
        <input
          class="input input-bordered w-full"
          placeholder="Nombre de la empresa"
          [(ngModel)]="name"
          [disabled]="loading"
        />
      </label>

      <label class="form-control w-full">
        <div class="label"><span class="label-text">Teléfono</span></div>
        <input
          class="input input-bordered w-full"
          placeholder="Ej. +593 99 123 4567"
          type="tel"
          [(ngModel)]="phone"
          [disabled]="loading"
        />
      </label>
    </div>

    <div class="modal-action">
      <button
        class="btn"
        type="button"
        (click)="onClose()"
        [disabled]="loading"
      >
        Cancelar
      </button>
      <button
        class="btn btn-neutral"
        type="button"
        (click)="submit()"
        [disabled]="loading"
      >
        <span *ngIf="loading" class="loading loading-spinner loading-sm"></span>
        {{ loading ? 'Guardando...' : 'Guardar cambios' }}
      </button>
    </div>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button type="button" (click)="onClose()">close</button>
  </form>
</dialog>
