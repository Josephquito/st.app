<!-- NAV WRAP -->
<header
  class="nav-wrap"
  [class.nav-wrap--visible]="navVisible"
  [class.nav-wrap--hidden]="!navVisible"
>
  <div class="navbar bg-base-100 shadow-sm px-4">
    <div class="flex-1">
      <button type="button" routerLink="/" class="btn btn-ghost text-xl">
        Jotavix
      </button>
    </div>

    <!-- DESKTOP -->
    <div class="hidden lg:flex items-center gap-3">
      <ng-container *ngIf="isLoggedIn && !hasCompany; else companyMenuDesktop">
        <button
          *ngIf="auth.hasPermission('USERS:READ')"
          type="button"
          class="menu-link"
          routerLink="/users"
          routerLinkActive="active"
        >
          Usuarios
        </button>
        <button
          *ngIf="auth.hasPermission('COMPANIES:READ')"
          type="button"
          class="menu-link"
          routerLink="/companies"
          routerLinkActive="active"
        >
          Empresas
        </button>
      </ng-container>

      <ng-template #companyMenuDesktop>
        <button
          *ngIf="isLoggedIn && auth.hasPermission('SUPPLIERS:READ')"
          type="button"
          class="menu-link"
          routerLink="/suppliers"
          routerLinkActive="active"
        >
          Proveedores
        </button>
        <button
          *ngIf="auth.hasPermission('CUSTOMERS:READ')"
          type="button"
          class="menu-link"
          routerLink="/customers"
          routerLinkActive="active"
        >
          Clientes
        </button>
        <button
          *ngIf="auth.hasPermission('STREAMING_ACCOUNTS:READ')"
          type="button"
          class="menu-link"
          routerLink="/accounts"
          routerLinkActive="active"
        >
          Cuentas
        </button>
        <button
          *ngIf="auth.hasPermission('STREAMING_SALES:READ')"
          type="button"
          class="menu-link"
          routerLink="/reportes"
          routerLinkActive="active"
        >
          Reportes
        </button>
      </ng-template>

      <!-- Submenu usuario desktop -->
      <div *ngIf="isLoggedIn" class="relative">
        <button
          type="button"
          class="btn btn-ghost btn-sm gap-1"
          (click)="toggleUserMenu($event)"
        >
          <span class="text-sm opacity-70">{{ displayName }}</span>
          <svg
            class="h-4 w-4 opacity-70"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 10.94l3.71-3.71a.75.75 0 1 1 1.06 1.06l-4.24 4.24a.75.75 0 0 1-1.06 0L5.21 8.29a.75.75 0 0 1 .02-1.08z"
              clip-rule="evenodd"
            />
          </svg>
        </button>

        <ul
          *ngIf="userMenuOpen"
          class="absolute right-0 top-full mt-2 menu p-3 shadow-lg bg-base-100 rounded-box w-64 border border-base-200 z-[9999]"
          (click)="$event.stopPropagation()"
        >
          <li class="mb-1">
            <span class="text-xs uppercase opacity-60">Empresa actual</span>
          </li>
          <li>
            <span class="pointer-events-none font-semibold">
              {{ hasCompany ? activeCompanyName : "Sin empresa seleccionada" }}
            </span>
          </li>
          <div class="divider my-2"></div>
          <li *ngIf="hasCompany">
            <button
              type="button"
              class="py-2"
              (click)="changeCompanyFromMenu()"
            >
              Cambiar empresa
            </button>
          </li>
          <li>
            <button
              type="button"
              class="py-2 text-error"
              (click)="logoutFromMenu()"
            >
              Cerrar sesión
            </button>
          </li>
        </ul>
      </div>

      <button
        *ngIf="!isLoggedIn"
        type="button"
        routerLink="/login"
        routerLinkActive="active"
        class="menu-link"
      >
        Acceder
      </button>
    </div>

    <!-- MOBILE hamburger -->
    <div class="lg:hidden">
      <button
        type="button"
        class="btn btn-ghost btn-circle hamburger"
        aria-label="Abrir menú"
        [attr.aria-expanded]="mobileOpen"
        (click)="toggleMobileMenu($event)"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          class="h-5 w-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- Overlay mobile -->
<div
  class="mobile-overlay"
  [class.open]="mobileOpen"
  (click)="closeMobileMenu()"
></div>

<!-- Panel mobile -->
<nav #mobileMenu class="mobile-panel" [class.open]="mobileOpen">
  <ng-container *ngIf="isLoggedIn && !hasCompany; else companyMenuMobile">
    <button
      *ngIf="auth.hasPermission('USERS:READ')"
      type="button"
      class="mobile-link"
      routerLink="/users"
      routerLinkActive="active"
      (click)="closeMobileMenu()"
    >
      Usuarios
    </button>
    <button
      *ngIf="auth.hasPermission('COMPANIES:READ')"
      type="button"
      class="mobile-link"
      routerLink="/companies"
      routerLinkActive="active"
      (click)="closeMobileMenu()"
    >
      Empresas
    </button>
  </ng-container>

  <ng-template #companyMenuMobile>
    <button
      *ngIf="auth.hasPermission('SUPPLIERS:READ')"
      type="button"
      class="mobile-link"
      routerLink="/suppliers"
      routerLinkActive="active"
      (click)="closeMobileMenu()"
    >
      Proveedores
    </button>
    <button
      *ngIf="auth.hasPermission('CUSTOMERS:READ')"
      type="button"
      class="mobile-link"
      routerLink="/customers"
      routerLinkActive="active"
      (click)="closeMobileMenu()"
    >
      Clientes
    </button>
    <button
      *ngIf="auth.hasPermission('STREAMING_ACCOUNTS:READ')"
      type="button"
      class="mobile-link"
      routerLink="/accounts"
      routerLinkActive="active"
      (click)="closeMobileMenu()"
    >
      Cuentas
    </button>
    <button
      *ngIf="auth.hasPermission('STREAMING_SALES:READ')"
      type="button"
      class="mobile-link"
      routerLink="/reportes"
      routerLinkActive="active"
      (click)="closeMobileMenu()"
    >
      Reportes
    </button>
  </ng-template>

  <div *ngIf="isLoggedIn" class="mt-4 px-3">
    <div class="divider my-2"></div>
    <div class="text-xs uppercase opacity-60 mb-2">Cuenta</div>
    <div class="mb-3">
      <div class="text-xs opacity-70">Empresa actual</div>
      <div class="font-semibold">
        {{ hasCompany ? activeCompanyName : "Sin empresa seleccionada" }}
      </div>
    </div>
    <button
      *ngIf="hasCompany"
      type="button"
      class="mobile-link"
      (click)="changeCompany()"
    >
      Cambiar empresa
    </button>
    <button type="button" class="mobile-link mobile-logout" (click)="logout()">
      Cerrar sesión
    </button>
  </div>

  <button
    *ngIf="!isLoggedIn"
    type="button"
    class="mobile-link"
    routerLink="/login"
    (click)="closeMobileMenu()"
  >
    Acceder
  </button>
</nav>

<!-- Contenido -->
<router-outlet></router-outlet>
